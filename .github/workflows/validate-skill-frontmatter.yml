name: Validate SKILL Front Matter

on:
  push:
    paths:
      - SKILL.md
      - .github/workflows/validate-skill-frontmatter.yml
  pull_request:
    paths:
      - SKILL.md
      - .github/workflows/validate-skill-frontmatter.yml
  workflow_dispatch:

jobs:
  validate-skill-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Front Matter Structure and Keys
        shell: bash
        run: |
          set -euo pipefail

          FILE="SKILL.md"
          test -f "$FILE" || { echo "Missing $FILE"; exit 1; }

          # Enforce LF-only newlines to avoid parser edge cases.
          if LC_ALL=C grep -n $'\r' "$FILE" >/dev/null; then
            echo "CRLF detected in $FILE. Use LF newlines only."
            exit 1
          fi

          first_line="$(sed -n '1p' "$FILE")"
          if [[ "$first_line" != "---" ]]; then
            echo "Front matter must start at line 1 with '---'."
            exit 1
          fi

          closing_line="$(awk 'NR>1 && $0=="---" { print NR; exit }' "$FILE")"
          if [[ -z "$closing_line" ]]; then
            echo "Missing closing '---' delimiter for front matter."
            exit 1
          fi

          if [[ "$closing_line" -lt 3 ]]; then
            echo "Front matter block is too short."
            exit 1
          fi

          sed -n "2,$((closing_line - 1))p" "$FILE" > /tmp/skill-frontmatter.yml

          ruby <<'RUBY'
          require "psych"

          raw = File.read("/tmp/skill-frontmatter.yml")
          data = Psych.safe_load(raw, aliases: false)

          raise "Front matter must parse to a YAML mapping." unless data.is_a?(Hash)

          required = %w[name description compatibility]
          required.each do |key|
            value = data[key]
            raise "Missing required key: #{key}" if value.nil?
            raise "Key '#{key}' must be a non-empty string." unless value.is_a?(String) && !value.strip.empty?
          end
          RUBY

          echo "SKILL.md front matter validation passed."
